<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Gathering for Nature, Territory and Communities</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; line-height:1.6; }
    header { position:fixed; top:0; width:100%; background:#1b4332; color:white; padding:10px 20px; display:flex; justify-content:space-between; align-items:center; z-index:1000; }
    nav a { color:white; margin:0 10px; text-decoration:none; }
    .container { padding:80px 20px; max-width:1000px; margin:auto; }
    section { margin-bottom:60px; }
    h1,h2 { color:#1b4332; }
    .hero { background:#d8f3dc; padding:120px 20px; text-align:center; }
    .btn { background:#2d6a4f; color:white; padding:10px 20px; text-decoration:none; border-radius:5px; }
    .themes { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:10px; }
    .card { background:#f1faee; padding:15px; border-radius:8px; }
    footer { background:#1b4332; color:white; text-align:center; padding:20px; }
    .lang-toggle { cursor:pointer; background:#95d5b2; border:none; padding:5px 10px; border-radius:5px; }
  </style>
</head>
<body>

<header>
  <div>Global Gathering</div>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#themes">Themes</a>
    <a href="#program">Program</a>
    <a href="#register">Register</a>
  </nav>
  <button class="lang-toggle" onclick="toggleLang()">ES</button>
</header>

<section id="home" class="hero container">
  <h1 data-en="Global Gathering for Nature, Territory and Communities" data-es="Encuentro Global por la Naturaleza, los Territorios y las Comunidades"></h1>
  <p>April 3–5, 2026 | Imbabura, Ecuador</p>
  <p data-en="A global space to connect Indigenous Peoples..." data-es="Un espacio global que reunirá a pueblos indígenas..."></p>
  <a href="#register" class="btn">Register</a>
</section>

<section id="about" class="container">
  <h2 data-en="About" data-es="Sobre el evento"></h2>
  <p data-en="The Global Gathering for Nature, Territory and Communities brings together leaders..." data-es="El Encuentro Global por la Naturaleza reunirá a líderes..."></p>
</section>

<section id="themes" class="container">
  <h2 data-en="Key Themes" data-es="Ejes temáticos"></h2>
  <div class="themes">
    <div class="card" data-en="Territorial Governance and Indigenous Leadership" data-es="Gobernanza territorial y liderazgo indígena"></div>
    <div class="card" data-en="Community-Based Conservation" data-es="Conservación comunitaria"></div>
    <div class="card" data-en="Climate Justice" data-es="Justicia climática"></div>
  </div>
</section>

<section id="program" class="container">
  <h2 data-en="Program" data-es="Programa"></h2>
  <p>Day 1 – Territories, Knowledge and Community Leadership</p>
  <p>Day 2 – Collaboration and Innovation</p>
  <p>Day 3 – Global Alliances</p>
</section>

<section id="register" class="container">
  <h2 data-en="Register" data-es="Registro"></h2>
  <form>
    <input type="text" placeholder="Name" required><br><br>
    <input type="email" placeholder="Email" required><br><br>
    <input type="text" placeholder="Organization"><br><br>
    <button class="btn">Submit</button>
  </form>
</section>

<footer>
  <p>Imbabura, Ecuador</p>
</footer>

<script>
let currentLang = 'en';

function toggleLang() {
  currentLang = currentLang === 'en' ? 'es' : 'en';
  document.querySelector('.lang-toggle').innerText = currentLang === 'en' ? 'ES' : 'EN';

  document.querySelectorAll('[data-en]').forEach(el => {
    el.innerText = el.getAttribute('data-' + currentLang);
  });
}

// Initialize
window.onload = () => toggleLang();
</script>

</body>
</html>
