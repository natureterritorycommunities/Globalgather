<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Gathering</title>

  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
  <div class="container header-inner">
    <div class="logo">Global Gathering</div>

    <nav>
      <a href="#home">Home</a>
      <a href="#themes">Themes</a>
      <a href="#program">Program</a>
      <a href="#register">Register</a>
    </nav>

    <button onclick="toggleLang()">ES</button>
  </div>
</header>

<section id="home" class="hero">

  <div class="carousel">
    <img src="images/hero.jpg" class="slide active">
    <img src="images/hero1.jpg" class="slide">
    <img src="images/hero2.jpg" class="slide">
  </div>

  <div class="overlay"></div>

  <div class="hero-content">
    <h1 data-en="Global Gathering for Nature, Territory and Communities"
        data-es="Encuentro Global por la Naturaleza, los Territorios y las Comunidades"></h1>

    <p>April 3–5, 2026 | Imbabura, Ecuador</p>

    <a href="#register" class="btn">Register</a>
  </div>

</section>

<section id="themes" class="container section">
  <h2 data-en="Key Themes" data-es="Ejes temáticos"></h2>

  <div class="themes">
    <div class="card">
      <img src="images/theme1.jpg">
      <p data-en="Territorial Governance" data-es="Gobernanza territorial"></p>
    </div>

    <div class="card">
      <img src="images/theme2.jpg">
      <p data-en="Community Conservation" data-es="Conservación comunitaria"></p>
    </div>

    <div class="card">
      <img src="images/theme3.jpg">
      <p data-en="Climate Justice" data-es="Justicia climática"></p>
    </div>
    <div class="card">
      <img src="images/theme4.jpg">
      <p data-en="Economy and Sustainability" data-es="Economia y Sostenibilidad"></p>
    </div>
  </div>
  
</section>

<section id="program" class="container section">
  <h2 data-en="Program" data-es="Programa"></h2>
  <p><strong>Day 1:</strong> Territories & Leadership</p>
  <p><strong>Day 2:</strong> Innovation & Strategies</p>
  <p><strong>Day 3:</strong> Global Alliances</p>
</section>

<section id="register" class="container section">
  <h2 data-en="Register" data-es="Registro"></h2>

  <form class="form">
    <input type="text" placeholder="Name" required>
    <input type="email" placeholder="Email" required>
    <button class="btn">Submit</button>
  </form>
</section>

<script src="script.js"></script>
</body>
</html>
